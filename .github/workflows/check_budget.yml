name: Check Meta Ad Account Budget

on:
  schedule:
    # Primary: every hour at minute 17. Recovery: minute 47, and exits when primary succeeded.
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:

concurrency:
  group: budget-alert-production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  check-budget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore alert state
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: meta-budget-alert-state-${{ github.run_id }}
          restore-keys: |
            meta-budget-alert-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture workflow timing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "WORKFLOW_CREATED_TIME=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} --jq .created_at)" >> "$GITHUB_ENV"
          echo "JOB_STARTED_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "47 * * * *" ]; then
            echo "BUDGET_ALERT_TRIGGER=recovery" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "BUDGET_ALERT_TRIGGER=schedule" >> "$GITHUB_ENV"
          else
            echo "BUDGET_ALERT_TRIGGER=manual" >> "$GITHUB_ENV"
          fi

      - name: Validate restored state
        shell: bash
        run: python -c "import json; state=json.load(open('state.json', encoding='utf-8')); assert isinstance(state.get('accounts'), dict)"

      - name: Check budget
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STATE_FILE: state.json
        run: python main.py --check-budget

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: meta-budget-alert-state-${{ github.run_id }}

      - name: Upload Budget Alert execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-alert-log-${{ github.run_id }}
          path: logs/budget_alert.log
          if-no-files-found: warn
          retention-days: 14
