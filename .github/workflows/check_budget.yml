name: Check Meta Ad Account Budget

on:
  schedule:
    # Beijing time 09:00 and 18:00.
    - cron: "0 1,10 * * *"
  workflow_dispatch:

jobs:
  check-budget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: meta-budget-alert/state.json
          key: meta-budget-alert-state-${{ github.run_id }}
          restore-keys: |
            meta-budget-alert-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: meta-budget-alert
        run: pip install -r requirements.txt

      - name: Check budget
        working-directory: meta-budget-alert
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STATE_FILE: state.json
        run: python main.py

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: meta-budget-alert/state.json
          key: meta-budget-alert-state-${{ github.run_id }}
